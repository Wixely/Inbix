name: CI

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Inbix.slnx

      - name: Build
        run: dotnet build Inbix.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Inbix.slnx -c Release --no-build --verbosity normal
