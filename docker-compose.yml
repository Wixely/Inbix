# Sample Docker Compose for Inbix.
# Copy/adjust the environment values, then: docker compose up -d --build
services:
  inbix:
    build: .
    image: inbix:local
    container_name: inbix
    restart: unless-stopped
    ports:
      - "25:25"      # inbound SMTP (must be reachable from the internet for real mail)
      - "8080:8080"  # web UI + API (keep this behind a VPN / reverse proxy in production)
    environment:
      # Domains this instance accepts mail for (double-underscore = nested config).
      Inbix__Domains__0: "mydomain.com"

      # SMTP listener.
      Inbix__Smtp__Port: "25"
      Inbix__Smtp__ServerName: "mail.mydomain.com"
      Inbix__Smtp__MaxMessageSizeBytes: "26214400"

      # All persistent state (SQLite db, raw MIME/attachments, backups, DataProtection keys)
      # defaults to /data in the image, so the single volume below is the only mount needed.

      # --- Network filesystem (NFS/SMB) for /data ---
      # SQLite's default WAL mode needs a shared-memory (-shm) file, which network filesystems cannot
      # provide — symptoms are "unable to open database file" (14) and "locking protocol" (15). If /data
      # is on NFS/SMB, set ExclusiveLocking=true: SQLite then keeps the WAL index in heap memory and
      # serialises all access through one connection, which works without shared memory. Local disk is
      # still preferable (and the default false); see SETUP.md "Storage on a network filesystem".
      # Inbix__Database__ExclusiveLocking: "true"
      # Inbix__Database__JournalMode: "WAL"   # or "DELETE" for a rollback journal (no WAL)

      # Scheduled database backups (online/consistent), stored under /data/backups.
      Inbix__Backups__Enabled: "true"
      Inbix__Backups__IntervalHours: "24"
      Inbix__Backups__RetentionCount: "7"

      # Admin login. Set a password (or PasswordHash) — without one the UI/API are OPEN.
      # Generate a hash: docker compose run --rm inbix dotnet Inbix.Web.dll hash-password "your-password"
      Inbix__Admin__Username: "admin"
      Inbix__Admin__Password: "change-me"
      # Inbix__Admin__PasswordHash: "pbkdf2-sha256$..."   # preferred over plaintext Password

      # Optional API key for programmatic access (the browser UI uses the login cookie).
      Inbix__Admin__ApiKey: ""

      # Set true when TLS terminates at a reverse proxy (honours X-Forwarded-Proto, Secure cookie).
      Inbix__RequireHttps: "false"

      # Background diagnostics run a few seconds after startup, then every N hours (0 = startup only).
      Inbix__Diagnostics__IntervalHours: "6"

      # Retention cleanup cadence (CleanupIntervalHours) drives both Junk deletion (after RetentionDays)
      # and per-mailbox expiry (configured per alias on the Aliases page).
      Inbix__Junk__RetentionDays: "30"
      Inbix__Junk__CleanupIntervalHours: "24"

      ASPNETCORE_ENVIRONMENT: "Production"
    volumes:
      # Single mount point holding ALL state: db, raw mail, backups, and keys.
      - inbix-data:/data

volumes:
  inbix-data:
